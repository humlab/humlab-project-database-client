<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Humlab Showcase</title>
    <link rel="stylesheet" href="stylesheets/main.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <p class="eyebrow">
          <img src="assets/umu-logo-left-neg-SE.svg" alt="Umeå University" class="eyebrow__logo" />
        </p>
        <h1>Humlab Showcase</h1>
        <p class="subhead">
          A showcase of projects from Humlab, Umeå University. Click on a cube to explore the project details.
        </p>
      </header>

      <div class="hero-search">
        <input
          type="search"
          class="hero-search__input"
          placeholder="Filter projects…"
          autocomplete="off"
          aria-label="Filter projects"
        />
      </div>

      <section class="cube-stage" aria-label="Project navigation grid">
        <div class="cube-grid" id="cube-grid"></div>
      </section>
    </main>
  </body>
</html>
